<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — TeaShop</title>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Стили авторизации -->
  <link rel="stylesheet" href="../css/auth.css">

  <!-- Логика регистрации -->
  <script type="module" src="../js/auth/register.js"></script>
</head>
<body>

  <!-- Шапка сайта с навигацией -->
  <header id="site-header">
    <a href="/" class="logo">TeaShop</a>

    <!-- Навигация для гостей -->
    <nav id="guest-nav">
      <a href="login.html">Вход</a>
      <a href="register.html">Регистрация</a>
    </nav>

    <!-- Навигация для авторизованных -->
    <nav id="user-nav" style="display: none;">
      <a href="profile.html">Профиль</a>
      <button id="logout-btn">Выход</button>
    </nav>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Регистрация</h1>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="full-name">Имя</label>
          <input
            type="text"
            id="full-name"
            name="full-name"
            placeholder="Ваше имя"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Минимум 6 символов"
            autocomplete="new-password"
            required
          >
        </div>

        <div class="form-group">
          <label for="password-confirm">Подтверждение пароля</label>
          <input
            type="password"
            id="password-confirm"
            name="password-confirm"
            placeholder="Повторите пароль"
            autocomplete="new-password"
            required
          >
        </div>

        <!-- Сообщение об ошибке — скрыто по умолчанию через CSS -->
        <p id="error-message"></p>

        <button type="submit">Зарегистрироваться</button>
      </form>

      <p class="auth-link">
        Уже есть аккаунт? <a href="login.html">Войдите</a>
      </p>
    </div>
  </main>

</body>
</html>
