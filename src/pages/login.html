<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход — TeaShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="bg-parchment text-tea-dark font-sans min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav id="main-nav" class="w-full py-6">
      <div class="max-w-7xl mx-auto px-6">
        <a href="/" class="flex items-center gap-4 group w-fit">
          <div class="w-12 h-12 bg-almond-silk rounded-full flex items-center justify-center text-white group-hover:rotate-12 transition-transform">
            <i data-lucide="leaf" size="24"></i>
          </div>
          <span class="text-3xl font-serif font-bold tracking-tight text-tea-dark">TeaShop</span>
        </a>
      </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-6 py-12">
      <div class="w-full max-w-md">
        <div class="bg-white p-12 border border-bone shadow-sm">
          <div class="text-center mb-12">
            <h1 class="text-4xl font-serif text-tea-dark mb-4">С возвращением</h1>
            <p class="text-tea-dark/50 text-sm">Войдите в свой аккаунт, чтобы продолжить</p>
          </div>

          <form id="login-form" class="space-y-6">
            <div class="space-y-2">
              <label class="text-[10px] uppercase tracking-widest font-bold text-almond-silk">Email</label>
              <input type="email" id="email" required class="input-field w-full" placeholder="example@mail.com">
            </div>
            <div class="space-y-2">
              <label class="text-[10px] uppercase tracking-widest font-bold text-almond-silk">Пароль</label>
              <input type="password" id="password" required class="input-field w-full" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="btn-primary w-full">Войти</button>
            <p id="error-message" class="text-xs text-red-400 mt-4 text-center hidden"></p>
          </form>

          <div class="mt-12 pt-8 border-t border-bone/50 text-center">
            <p class="text-sm text-tea-dark/50">
              Нет аккаунта?
              <a href="/src/pages/register.html" class="text-almond-silk font-bold hover:text-tea-dark transition-colors">Зарегистрироваться</a>
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <script type="module" src="/src/js/auth/login.js"></script>
  </body>
</html>
